<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - POSIGRAF</title>
    <link rel="stylesheet" href="../adm-style.css">
    <link rel="stylesheet" href="aluno-style.css">
</head>
<body>
    <div id="main">
        <header id="headerpage">
            <h1> <img src="../../../icone-posigraf.png"w width="50"  alt="marca-posigraf.png">POSIGRAF <i class="fa-solid fa-bars"></i></h1>
            <a href="../../../index.html"><button id="sair">sair</button></a>
        </header>

        <div class="container">
            <h2>Gerenciar Alunos</h2>

            <!-- Formulário -->
            <div class="form-card">
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="inputNome" placeholder="Nome">
                <input type="text" id="inputCurso" placeholder="Curso">
                <input type="email" id="inputEmail" placeholder="E-mail">
                <button onclick="salvar()">Salvar</button>
                <button id="btnCancelar" onclick="cancelar()" style="display:none">Cancelar</button>
            </div>

            <!-- Tabela -->
            <table id="tabelaAlunos">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Curso</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script src="aluno-script.js"></script>
</body>
</html>
